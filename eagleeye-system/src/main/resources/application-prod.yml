# 生产环境配置
server:
  port: 8080

spring:
  datasource:
    druid:
      url: jdbc:mysql://prod-mysql:3306/eagleeye_finance?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=true&serverTimezone=Asia/Shanghai
      username: ${DB_USERNAME}
      password: ${DB_PASSWORD}

  data:
    redis:
      host: ${REDIS_HOST}
      port: 6379
      password: ${REDIS_PASSWORD}
      database: 0

  kafka:
    bootstrap-servers: ${KAFKA_SERVERS}

logging:
  level:
    com.eagleeye: INFO

knife4j:
  production: true
